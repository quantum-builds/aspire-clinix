<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patient Referral Form</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2e2b27;
    --surface: #3a3630;
    --surface2: #444039;
    --border: #5a5449;
    --border-focus: #c9a96e;
    --text: #e8e0d4;
    --text-muted: #9e9488;
    --accent: #c9a96e;
    --accent-dark: #a8883f;
    --error: #e07070;
    --success: #6ebd9a;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.2px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  label .req {
    color: var(--error);
    margin-left: 3px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  input[type="date"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
  }

  input::placeholder, textarea::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .phone-field {
    display: flex;
    gap: 0;
  }

  .phone-field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    color: var(--text);
    padding: 10px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 70px;
  }

  .phone-field select:focus {
    border-color: var(--accent);
  }

  .phone-field input {
    border-radius: 0 var(--radius) var(--radius) 0;
    flex: 1;
  }

  /* Checkboxes */
  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 24px;
    margin-top: 4px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 0;
  }

  .checkbox-label:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.06);
  }

  .checkbox-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-label input[type="radio"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-label.checked {
    border-color: var(--accent);
    background: rgba(201,169,110,0.1);
  }

  /* Radio as checkbox style */
  .radio-row {
    display: flex;
    gap: 12px;
  }

  .radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    font-size: 13px;
    color: var(--text);
  }

  .radio-label:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.06);
  }

  .radio-label input[type="radio"] {
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* File Upload */
  .upload-area {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
  }

  .upload-area:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.04);
  }

  .upload-area input[type="file"] {
    display: none;
  }

  .upload-icon {
    font-size: 22px;
    margin-bottom: 6px;
    display: block;
  }

  .upload-text {
    font-size: 13px;
    color: var(--text-muted);
  }

  .upload-text span {
    color: var(--accent);
    font-weight: 500;
  }

  #file-list {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Submit */
  .btn-submit {
    background: var(--accent);
    color: #1e1c19;
    border: none;
    border-radius: 50px;
    padding: 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 170px;
  }

  .btn-loader {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(30, 28, 25, 0.25);
    border-top-color: #1e1c19;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-submit:hover {
    background: var(--accent-dark);
    box-shadow: 0 4px 18px rgba(201,169,110,0.3);
  }

  .btn-submit:active { transform: scale(0.98); }

  .btn-submit:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(12px);
    z-index: 999;
    max-width: 320px;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  #toast.success { background: var(--success); color: #0f2a1e; }
  #toast.error   { background: var(--error);   color: #2a0f0f; }

  .field-error {
    font-size: 11px;
    color: var(--error);
    margin-top: 4px;
  }

  input.invalid, textarea.invalid {
    border-color: var(--error) !important;
  }

  @media (max-width: 540px) {
    .row-2, .checkbox-grid { grid-template-columns: 1fr; }
    .page-title { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- PATIENT DETAILS -->
  <div class="card">
    <div class="section-title">Patient Details</div>

    <div class="row-2">
      <div class="field">
        <label>First Name <span class="req">*</span></label>
        <input type="text" id="patientFirstName" placeholder="First name" />
        <div class="field-error" id="err-patientFirstName"></div>
      </div>
      <div class="field">
        <label>Last Name <span class="req">*</span></label>
        <input type="text" id="patientLastName" placeholder="Last name" />
        <div class="field-error" id="err-patientLastName"></div>
      </div>
    </div>

    <div class="field">
      <label>Date of Birth <span class="req">*</span></label>
      <input type="date" id="dob" />
      <div class="field-error" id="err-dob"></div>
    </div>

    <div class="field">
      <label>Address</label>
      <input type="text" id="address" placeholder="Street, city, postcode" />
    </div>

    <div class="row-2">
      <div class="field">
        <label>Mobile Number <span class="req">*</span></label>
        <div class="phone-field">
          <select id="mobileCountry">
            <option value="+92">PK +92</option>
            <option value="+44">GB +44</option>
            <option value="+1">US +1</option>
            <option value="+91">IN +91</option>
            <option value="+61">AU +61</option>
          </select>
          <input type="tel" id="mobileNumber" placeholder="3001234567" />
        </div>
        <div class="field-error" id="err-mobileNumber"></div>
      </div>
      <div class="field">
        <label>Email Address <span class="req">*</span></label>
        <input type="email" id="patientEmail" placeholder="patient@email.com" />
        <div class="field-error" id="err-patientEmail"></div>
      </div>
    </div>

    <div class="field">
      <label>Medical History</label>
      <textarea id="medicalHistory" placeholder="Relevant medical history, allergies, medications..."></textarea>
    </div>

    <div class="field">
      <!-- FIX 1: Replaced &amp; with & inside label text (safe in HTML content) -->
      <label>Please describe the treatment required in as much detail as possible (for CBCT Scans please state which teeth require the scan and provide justification): </label>
      <label>Dental Specialty<span class="req">*</span></label>
      
      <div class="checkbox-grid" id="referralServices">
        <label class="checkbox-label"><input type="radio" name="referralService" value="Implants" /> Implants</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Periodontology" /> Periodontology</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Oral Surgery" /> Oral Surgery</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Dentures" /> Dentures</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Root Canal" /> Root Canal</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Paediatric Dentistry" /> Paediatric Dentistry</label>
        <label class="checkbox-label"><input type="radio" name="referralService" value="Orthodontics" /> Orthodontics</label>
        <!-- FIX 2: &amp; is correct in HTML attribute/text content — kept as-is here -->
        <label class="checkbox-label"><input type="radio" name="referralService" value="Treatment Planning & Advice" /> Treatment Planning &amp; Advice</label>
      </div>
      <div class="field-error" id="err-services"></div>
      <div class="field" style="margin-top: 18px; margin-bottom: 0;">
        <label>CBCT</label>
        <div class="checkbox-grid" id="cbctFieldOfView">
          <label class="checkbox-label"><input type="radio" name="referralService" value="Single Tooth (≤5×5 cm)" /> Single Tooth (≤5×5 cm)</label>
          <label class="checkbox-label"><input type="radio" name="referralService" value="Quadrant (8×5 cm)" /> Quadrant (8×5 cm)</label>
          <label class="checkbox-label"><input type="radio" name="referralService" value="Single Jaw (8×8 cm)" /> Single Jaw (8×8 cm)</label>
          <label class="checkbox-label"><input type="radio" name="referralService" value="Both Jaws (&gt;8×8 cm)" /> Both Jaws (&gt;8×8 cm)</label>
        </div>
      </div>
    </div>

    <div class="field">
      <label>Upload Supporting Documents <small style="text-transform:none;letter-spacing:0">(Photographs, Radiographs)</small></label>
      <!-- FIX 3: Removed onclick from div; using a proper label-for pattern instead -->
      <div class="upload-area" id="uploadArea">
        <label for="fileUpload" style="cursor:pointer;display:block;">
          <span class="upload-icon">📁</span>
          <!-- FIX 4: &amp; is correct in HTML text — kept -->
          <div class="upload-text"><span>Click to upload</span> or drag &amp; drop</div>
          <div class="upload-text" style="margin-top:4px;font-size:11px">Images, PDF, Radiographs</div>
        </label>
        <input type="file" id="fileUpload" multiple accept="image/*,.pdf,.dcm" />
      </div>
      <div id="file-list"></div>
    </div>
  </div>

  <!-- REFERRING DENTIST DETAILS -->
  <div class="card">
    <div class="section-title">Referring Dentist Details</div>

    <div class="field">
      <label>Name of Dentist <span class="req">*</span></label>
      <input type="text" id="dentistName" placeholder="Dr. Full Name" />
      <div class="field-error" id="err-dentistName"></div>
    </div>

    <div class="field">
      <label>GDC Number <span class="req">*</span></label>
      <input type="text" id="gdcNumber" placeholder="e.g. 123456" />
      <div class="field-error" id="err-gdcNumber"></div>
    </div>
    

    <div class="field">
      <label>Referral Email</label>
      <input type="email" id="referralEmail" placeholder="referral@contact.com" />
      <div class="field-error" id="err-referralEmail"></div>
    </div>

    <div class="field">
      <label>Referral Phone Number</label>
      <div class="phone-field">
        <select id="referralCountry">
          <option value="+92">PK +92</option>
          <option value="+44">GB +44</option>
          <option value="+1">US +1</option>
          <option value="+91">IN +91</option>
          <option value="+61">AU +61</option>
        </select>
        <input type="tel" id="referralPhone" placeholder="3001234567" />
      </div>
      <div class="field-error" id="err-referralPhone"></div>
    </div>

    <div class="field">
      <label>Would you like to attend the treatment appointment and shadow the dentist? <span class="req">*</span></label>
      <div class="radio-row">
        <label class="radio-label"><input type="radio" name="shadow" value="yes" /> Yes</label>
        <label class="radio-label"><input type="radio" name="shadow" value="no" /> No</label>
      </div>
      <div class="field-error" id="err-shadow"></div>
    </div>

  </div>

  <!-- PRACTICE DETAILS -->
  <div class="card">
    <div class="section-title">Practice Details</div>

    <div class="field">
      <label>Practice Name <span class="req">*</span></label>
      <input type="text" id="practiceName" placeholder="Dental Practice Name" />
      <div class="field-error" id="err-practiceName"></div>
    </div>

    <div class="field">
      <label>Practice Address</label>
      <input type="text" id="practiceAddress" placeholder="Street, city, postcode" />
    </div>

    <div class="field">
      <label>Practice Email Address <span class="req">*</span></label>
      <input type="email" id="practiceEmail" placeholder="practice@clinic.com" />
      <div class="field-error" id="err-practiceEmail"></div>
    </div>

    <div class="field">
      <label>Practice Phone Number <span class="req">*</span></label>
      <div class="phone-field">
        <select id="practiceCountry">
          <option value="+92">PK +92</option>
          <option value="+44">GB +44</option>
          <option value="+1">US +1</option>
          <option value="+91">IN +91</option>
          <option value="+61">AU +61</option>
        </select>
        <input type="tel" id="practicePhone" placeholder="3001234567" />
      </div>
      <div class="field-error" id="err-practicePhone"></div>
    </div>

  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitForm()">Submit Referral</button>
</div>

<div id="toast"></div>

<script>
  var CBCT_OPTIONS = [
    'Single Tooth (≤5×5 cm)',
    'Quadrant (8×5 cm)',
    'Single Jaw (8×8 cm)',
    'Both Jaws (>8×8 cm)'
  ];

  // Visual state for checkbox/radio labels inside .checkbox-label
  document.querySelectorAll('.checkbox-label input[type="checkbox"], .checkbox-label input[type="radio"]').forEach(function(input) {
    input.addEventListener('change', function() {
      var label = input.closest('.checkbox-label');
      if (!label) return;
      if (input.type === 'radio' && input.name === 'referralService') {
        // clear checked class on any radio labels that belong to the referralService group
        document.querySelectorAll('.checkbox-label input[type="radio"][name="referralService"]').forEach(function(r) {
          var l = r.closest('.checkbox-label'); if (l) l.classList.remove('checked');
        });
        if (input.checked) label.classList.add('checked');
      } else if (input.type === 'radio') {
        // other radio groups (if any)
        var container = label.parentElement;
        if (container) container.querySelectorAll('.checkbox-label').forEach(function(l) { l.classList.remove('checked'); });
        if (input.checked) label.classList.add('checked');
      } else {
        label.classList.toggle('checked', input.checked);
      }
    });
  });

  // FIX 5: File input change listener attached via JS (not inline onchange)
  document.getElementById('fileUpload').addEventListener('change', updateFileList);

  function updateFileList() {
    var input = document.getElementById('fileUpload');
    var list = document.getElementById('file-list');
    if (!input.files || input.files.length === 0) {
      list.textContent = '';
      return;
    }
    list.textContent = Array.from(input.files).map(function(f) { return '\uD83D\uDCCE ' + f.name; }).join('  \u00B7  ');
  }

  // FIX 6: Drag & drop — input.files is read-only, use a DataTransfer object to assign files
  var uploadArea = document.getElementById('uploadArea');

  uploadArea.addEventListener('dragover', function(e) {
    e.preventDefault();
    uploadArea.style.borderColor = 'var(--accent)';
  });

  uploadArea.addEventListener('dragleave', function() {
    uploadArea.style.borderColor = '';
  });

  uploadArea.addEventListener('drop', function(e) {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    var fileInput = document.getElementById('fileUpload');
    // FIX: Cannot assign e.dataTransfer.files directly; use DataTransfer to copy files
    var dt = new DataTransfer();
    Array.from(e.dataTransfer.files).forEach(function(file) {
      dt.items.add(file);
    });
    fileInput.files = dt.files;
    updateFileList();
  });

  function showToast(msg, type) {
    type = type || 'success';
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show ' + type;
    setTimeout(function() { t.className = ''; }, 4000);
  }

  function setError(id, msg) {
    var el = document.getElementById('err-' + id);
    if (el) el.textContent = msg;
    var input = document.getElementById(id);
    if (input) input.classList.toggle('invalid', !!msg);
  }

  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(function(e) { e.textContent = ''; });
    document.querySelectorAll('.invalid').forEach(function(e) { e.classList.remove('invalid'); });
  }

  function validate() {
    var ok = true;

    function req(id, msg) {
      var el = document.getElementById(id);
      if (!el || !el.value.trim()) { setError(id, msg); ok = false; }
    }

    function email(id) {
      var el = document.getElementById(id);
      if (el && el.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) {
        setError(id, 'Enter a valid email address'); ok = false;
      }
    }

    req('patientFirstName', 'First name is required');
    req('patientLastName', 'Last name is required');
    req('dob', 'Date of birth is required');
    req('mobileNumber', 'Mobile number is required');
    req('patientEmail', 'Email is required');
    email('patientEmail');

    var services = Array.from(document.querySelectorAll('input[name="referralService"]:checked'));
    if (services.length === 0) { setError('services', 'Please select at least one service'); ok = false; }

    req('dentistName', 'Dentist name is required');
    req('gdcNumber', 'GDC number is required');
    req('practiceName', 'Practice name is required');
    req('practiceEmail', 'Practice email is required');
    email('practiceEmail');
    email('referralEmail');
    req('practicePhone', 'Practice phone is required');

    var shadow = document.querySelector('input[name="shadow"]:checked');
    if (!shadow) { setError('shadow', 'Please select an option'); ok = false; }

    return ok;
  }

  function setInputsDisabled(disabled) {
    document.querySelectorAll('input:not(#submitBtn), select, textarea').forEach(function(input) {
      input.disabled = disabled;
    });
  }

  function clearForm() {
    ['patientFirstName','patientLastName','dob','address','mobileNumber','patientEmail',
     'medicalHistory','dentistName','gdcNumber','practiceName','practiceAddress',
     'practiceEmail','practicePhone','referralEmail','referralPhone'].forEach(function(id) {
      var el = document.getElementById(id);
      if (el) el.value = '';
    });

    document.getElementById('fileUpload').value = '';
    document.getElementById('file-list').textContent = '';

    document.querySelectorAll('input[name="referralService"]').forEach(function(inp) {
      inp.checked = false;
      var lab = inp.closest('.checkbox-label'); if (lab) lab.classList.remove('checked');
    });

    document.querySelectorAll('input[name="shadow"]').forEach(function(radio) {
      radio.checked = false;
    });
  }

  async function submitForm() {
    clearErrors();
    if (!validate()) {
      showToast('Please fix the errors above.', 'error');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    var selectedServiceEl = document.querySelector('input[name="referralService"]:checked');
    var selectedService = selectedServiceEl ? selectedServiceEl.value : '';
    var isCbctSelection = CBCT_OPTIONS.indexOf(selectedService) !== -1;
    var shadowEl = document.querySelector('input[name="shadow"]:checked');
    var shadow = shadowEl ? shadowEl.value : '';

    var payload = {
      patientFirstName: document.getElementById('patientFirstName').value.trim(),
      patientLastName: document.getElementById('patientLastName').value.trim(),
      patientName: (document.getElementById('patientFirstName').value.trim() + ' ' + document.getElementById('patientLastName').value.trim()).trim(),
      patientDateOfBirth: document.getElementById('dob').value
        ? new Date(document.getElementById('dob').value).toISOString()
        : null,
      patientAddress: document.getElementById('address').value.trim(),
      patientPhoneNumber: document.getElementById('mobileCountry').value + document.getElementById('mobileNumber').value.trim(),
      patientEmail: document.getElementById('patientEmail').value.trim(),
      treatmentDetails: document.getElementById('medicalHistory').value.trim(),
      dentalSpecialty: isCbctSelection ? null : selectedService,
      cbctApp: isCbctSelection ? selectedService : null,
      referralName: document.getElementById('dentistName').value.trim(),
      referralGDC: document.getElementById('gdcNumber').value.trim(),
      referralPracticeNameAddress: document.getElementById('practiceName').value.trim() +
        (document.getElementById('practiceAddress').value ? ' - ' + document.getElementById('practiceAddress').value.trim() : ''),
      referralEmail: (document.getElementById('referralEmail') && document.getElementById('referralEmail').value.trim())
        ? document.getElementById('referralEmail').value.trim()
        : document.getElementById('practiceEmail').value.trim(),
      referralPhoneNumber: (document.getElementById('referralPhone') && document.getElementById('referralPhone').value.trim())
        ? document.getElementById('referralCountry').value + document.getElementById('referralPhone').value.trim()
        : document.getElementById('practiceCountry').value + document.getElementById('practicePhone').value.trim(),
      practiceName: document.getElementById('practiceName').value.trim(),
      practiceEmail: document.getElementById('practiceEmail').value.trim(),
      practicePhoneNumber: document.getElementById('practiceCountry').value + document.getElementById('practicePhone').value.trim(),
      attendTreatment: shadow === 'yes' ? 'Yes' : 'No',
      medicalHistoryPdfUrl: null,
      other: ''
    };

    var btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span> Submitting...';
    setInputsDisabled(true);

    try {
      var fileInput = document.getElementById('fileUpload');
      var file = (fileInput.files && fileInput.files.length > 0) ? fileInput.files[0] : null;

      if (file) {
        var fileTypeParam = 'others';
        if (file.type === 'application/pdf') fileTypeParam = 'pdf';
        else if (file.type.startsWith('image/')) fileTypeParam = 'images';
        else if (file.type.startsWith('video/')) fileTypeParam = 'video';

        var params = new URLSearchParams({
          fileName: file.name,
          fileType: fileTypeParam,
          mimeType: file.type,
          fileSize: String(file.size)
        });

        var signedRes = await fetch('http://localhost:3000/api/s3?' + params.toString());

        var signedJson = null;
        var ct = signedRes.headers.get('content-type') || '';
        if (ct.includes('application/json')) {
          try {
            signedJson = await signedRes.json();
          } catch (parseErr) {
            var text = await signedRes.text();
            console.error('Failed to parse JSON from /api/s3:', parseErr, text);
            throw new Error('Upload service returned invalid JSON response');
          }
        } else {
          var text = await signedRes.text();
          console.error('Non-JSON response from /api/s3:', text);
          throw new Error('Upload service returned non-JSON response: ' + (text ? text.slice(0,200) : ''));
        }

        if (!signedRes.ok || !signedJson || !signedJson.success || !signedJson.url) {
          console.error('Signed URL response:', signedRes.status, signedJson);
          throw new Error('Failed to obtain upload URL');
        }

        var signedUrl = signedJson.url;
        var put = await fetch(signedUrl, {
          method: 'PUT',
          body: file,
          headers: { 'Content-Type': file.type }
        });
        if (!put.ok) throw new Error('Failed to upload file to storage');

        console.log('url', signedUrl);
        var u = new URL(signedUrl);
        var key = u.pathname.replace(/^\//, '');
        console.log('key', key);

        payload.medicalHistoryPdfUrl = key;
      }

      var res = await fetch('http://localhost:3000/api/referrals', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      var data = null;
      try { data = await res.json(); } catch(e) { data = null; }

      if (!res.ok) {
        throw new Error((data && data.message) || ('Server error: ' + res.status));
      }

      showToast('Referral submitted successfully!', 'success');
      clearForm();

    } catch (err) {
      console.error(err);
      showToast(err.message || 'Submission failed. Please try again.', 'error');
    } finally {
      setInputsDisabled(false);
      btn.disabled = false;
      btn.innerHTML = 'Submit Referral';
    }
  }
</script>
</body>
</html>
