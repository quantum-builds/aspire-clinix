<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Patient Referral Form</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2e2b27;
    --surface: #3a3630;
    --surface2: #444039;
    --border: #5a5449;
    --border-focus: #c9a96e;
    --text: #e8e0d4;
    --text-muted: #9e9488;
    --accent: #c9a96e;
    --accent-dark: #a8883f;
    --error: #e07070;
    --success: #6ebd9a;
    --radius: 6px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 40px 20px 80px;
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
  }

  .page-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .page-subtitle {
    color: var(--text-muted);
    font-size: 13px;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.2px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 7px;
  }

  label .req {
    color: var(--error);
    margin-left: 3px;
  }

  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="date"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  input[type="date"]:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(201,169,110,0.12);
  }

  input::placeholder, textarea::placeholder {
    color: var(--text-muted);
    opacity: 0.6;
  }

  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.6);
    cursor: pointer;
  }

  textarea {
    resize: vertical;
    min-height: 100px;
  }

  .row-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .phone-field {
    display: flex;
    gap: 0;
  }

  .phone-field select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: var(--radius) 0 0 var(--radius);
    color: var(--text);
    padding: 10px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    outline: none;
    cursor: pointer;
    min-width: 70px;
  }

  .phone-field select:focus {
    border-color: var(--accent);
  }

  .phone-field input {
    border-radius: 0 var(--radius) var(--radius) 0;
    flex: 1;
  }

  /* Checkboxes */
  .checkbox-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 24px;
    margin-top: 4px;
  }

  .checkbox-label {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 9px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    text-transform: none;
    letter-spacing: 0;
    font-size: 13px;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 0;
  }

  .checkbox-label:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.06);
  }

  .checkbox-label input[type="checkbox"] {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }

  .checkbox-label.checked {
    border-color: var(--accent);
    background: rgba(201,169,110,0.1);
  }

  /* Radio as checkbox style */
  .radio-row {
    display: flex;
    gap: 12px;
  }

  .radio-label {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--bg);
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    font-size: 13px;
    color: var(--text);
  }

  .radio-label:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.06);
  }

  .radio-label input[type="radio"] {
    accent-color: var(--accent);
    cursor: pointer;
  }

  /* File Upload */
  .upload-area {
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
  }

  .upload-area:hover {
    border-color: var(--accent);
    background: rgba(201,169,110,0.04);
  }

  .upload-area input[type="file"] {
    display: none;
  }

  .upload-icon {
    font-size: 22px;
    margin-bottom: 6px;
    display: block;
  }

  .upload-text {
    font-size: 13px;
    color: var(--text-muted);
  }

  .upload-text span {
    color: var(--accent);
    font-weight: 500;
  }

  #file-list {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Submit */
  .btn-submit {
    background: var(--accent);
    color: #1e1c19;
    border: none;
    border-radius: 50px;
    padding: 13px 42px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-width: 170px;
  }

  .btn-loader {
    width: 14px;
    height: 14px;
    border: 2px solid rgba(30, 28, 25, 0.25);
    border-top-color: #1e1c19;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .btn-submit:hover {
    background: var(--accent-dark);
    box-shadow: 0 4px 18px rgba(201,169,110,0.3);
  }

  .btn-submit:active { transform: scale(0.98); }

  .btn-submit:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    padding: 14px 22px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    transform: translateY(12px);
    z-index: 999;
    max-width: 320px;
  }

  #toast.show {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  #toast.success { background: var(--success); color: #0f2a1e; }
  #toast.error   { background: var(--error);   color: #2a0f0f; }

  .field-error {
    font-size: 11px;
    color: var(--error);
    margin-top: 4px;
  }

  input.invalid, textarea.invalid {
    border-color: var(--error) !important;
  }

  @media (max-width: 540px) {
    .row-2, .checkbox-grid { grid-template-columns: 1fr; }
    .page-title { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <!-- PATIENT DETAILS -->
  <div class="card">
    <div class="section-title">Patient Details</div>

    <div class="row-2">
      <div class="field">
        <label>First Name <span class="req">*</span></label>
        <input type="text" id="patientFirstName" placeholder="First name" />
        <div class="field-error" id="err-patientFirstName"></div>
      </div>
      <div class="field">
        <label>Last Name <span class="req">*</span></label>
        <input type="text" id="patientLastName" placeholder="Last name" />
        <div class="field-error" id="err-patientLastName"></div>
      </div>
    </div>

    <div class="field">
      <label>Date of Birth <span class="req">*</span></label>
      <input type="date" id="dob" />
      <div class="field-error" id="err-dob"></div>
    </div>

    <div class="field">
      <label>Address</label>
      <input type="text" id="address" placeholder="Street, city, postcode" />
    </div>

    <div class="row-2">
      <div class="field">
        <label>Mobile Number <span class="req">*</span></label>
        <div class="phone-field">
          <select id="mobileCountry">
            <option value="+92">PK +92</option>
            <option value="+44">GB +44</option>
            <option value="+1">US +1</option>
            <option value="+91">IN +91</option>
            <option value="+61">AU +61</option>
          </select>
          <input type="tel" id="mobileNumber" placeholder="3001234567" />
        </div>
        <div class="field-error" id="err-mobileNumber"></div>
      </div>
      <div class="field">
        <label>Email Address <span class="req">*</span></label>
        <input type="email" id="patientEmail" placeholder="patient@email.com" />
        <div class="field-error" id="err-patientEmail"></div>
      </div>
    </div>

    <div class="field">
      <label>Medical History</label>
      <textarea id="medicalHistory" placeholder="Relevant medical history, allergies, medications..."></textarea>
    </div>

    <div class="field">
      <label>I am referring for <span class="req">*</span></label>
      <div class="checkbox-grid" id="referralServices">
        <label class="checkbox-label"><input type="checkbox" value="Implants" /> Implants</label>
        <label class="checkbox-label"><input type="checkbox" value="Periodontology" /> Periodontology</label>
        <label class="checkbox-label"><input type="checkbox" value="Oral Surgery" /> Oral Surgery</label>
        <label class="checkbox-label"><input type="checkbox" value="Dentures" /> Dentures</label>
        <label class="checkbox-label"><input type="checkbox" value="Root Canal" /> Root Canal</label>
        <label class="checkbox-label"><input type="checkbox" value="Paediatric Dentistry" /> Paediatric Dentistry</label>
        <label class="checkbox-label"><input type="checkbox" value="Orthodontics" /> Orthodontics</label>
        <label class="checkbox-label"><input type="checkbox" value="Treatment Planning & Advice" /> Treatment Planning &amp; Advice</label>
      </div>
      <div class="field-error" id="err-services"></div>
    </div>

    <div class="field">
      <label>Upload Supporting Documents <small style="text-transform:none;letter-spacing:0">(Photographs, Radiographs)</small></label>
      <div class="upload-area" onclick="document.getElementById('fileUpload').click()">
        <input type="file" id="fileUpload" multiple accept="image/*,.pdf,.dcm" onchange="updateFileList()" />
        <div class="upload-text"><span>Click to upload</span> or drag &amp; drop</div>
        <div class="upload-text" style="margin-top:4px;font-size:11px">Images, PDF, Radiographs</div>
      </div>
      <div id="file-list"></div>
    </div>
  </div>

  <!-- REFERRING DENTIST DETAILS -->
  <div class="card">
    <div class="section-title">Referring Dentist Details</div>

    <div class="field">
      <label>Name of Dentist <span class="req">*</span></label>
      <input type="text" id="dentistName" placeholder="Dr. Full Name" />
      <div class="field-error" id="err-dentistName"></div>
    </div>

    <div class="field">
      <label>GDC Number <span class="req">*</span></label>
      <input type="text" id="gdcNumber" placeholder="e.g. 123456" />
      <div class="field-error" id="err-gdcNumber"></div>
    </div>

    <div class="field">
      <label>Practice Name <span class="req">*</span></label>
      <input type="text" id="practiceName" placeholder="Dental Practice Name" />
      <div class="field-error" id="err-practiceName"></div>
    </div>

    <div class="field">
      <label>Practice Address</label>
      <input type="text" id="practiceAddress" placeholder="Street, city, postcode" />
    </div>

    <div class="field">
      <label>Practice Email Address <span class="req">*</span></label>
      <input type="email" id="practiceEmail" placeholder="practice@clinic.com" />
      <div class="field-error" id="err-practiceEmail"></div>
    </div>

    <div class="field">
      <label>Practice Phone Number <span class="req">*</span></label>
      <div class="phone-field">
        <select id="practiceCountry">
          <option value="+92">PK +92</option>
          <option value="+44">GB +44</option>
          <option value="+1">US +1</option>
          <option value="+91">IN +91</option>
          <option value="+61">AU +61</option>
        </select>
        <input type="tel" id="practicePhone" placeholder="3001234567" />
      </div>
      <div class="field-error" id="err-practicePhone"></div>
    </div>

    <div class="field">
      <label>Would you like to attend the treatment appointment and shadow the dentist? <span class="req">*</span></label>
      <div class="radio-row">
        <label class="radio-label"><input type="radio" name="shadow" value="yes" /> Yes</label>
        <label class="radio-label"><input type="radio" name="shadow" value="no" /> No</label>
      </div>
      <div class="field-error" id="err-shadow"></div>
    </div>
  </div>

  <button class="btn-submit" id="submitBtn" onclick="submitForm()">Submit Referral</button>
</div>

<div id="toast"></div>

<script>
  // Checkbox visual state
  document.querySelectorAll('.checkbox-label input[type="checkbox"]').forEach(cb => {
    cb.addEventListener('change', () => {
      cb.closest('.checkbox-label').classList.toggle('checked', cb.checked);
    });
  });

  function updateFileList() {
    const input = document.getElementById('fileUpload');
    const list = document.getElementById('file-list');
    if (input.files.length === 0) { list.textContent = ''; return; }
    list.textContent = Array.from(input.files).map(f => `📎 ${f.name}`).join('  ·  ');
  }

  // Drag & Drop
  const uploadArea = document.querySelector('.upload-area');
  uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.style.borderColor = 'var(--accent)'; });
  uploadArea.addEventListener('dragleave', () => { uploadArea.style.borderColor = ''; });
  uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.style.borderColor = '';
    document.getElementById('fileUpload').files = e.dataTransfer.files;
    updateFileList();
  });

  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 4000);
  }

  function setError(id, msg) {
    const el = document.getElementById('err-' + id);
    if (el) el.textContent = msg;
    const input = document.getElementById(id);
    if (input) input.classList.toggle('invalid', !!msg);
  }

  function clearErrors() {
    document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
    document.querySelectorAll('.invalid').forEach(e => e.classList.remove('invalid'));
  }

  function validate() {
    let ok = true;
    const req = (id, msg) => {
      const el = document.getElementById(id);
      if (!el || !el.value.trim()) { setError(id, msg); ok = false; }
    };
    const email = (id) => {
      const el = document.getElementById(id);
      if (el && el.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(el.value)) {
        setError(id, 'Enter a valid email address'); ok = false;
      }
    };

    req('patientFirstName', 'First name is required');
    req('patientLastName', 'Last name is required');
    req('dob', 'Date of birth is required');
    req('mobileNumber', 'Mobile number is required');
    req('patientEmail', 'Email is required');
    email('patientEmail');

    const services = [...document.querySelectorAll('#referralServices input:checked')];
    if (services.length === 0) { setError('services', 'Please select at least one service'); ok = false; }

    req('dentistName', 'Dentist name is required');
    req('gdcNumber', 'GDC number is required');
    req('practiceName', 'Practice name is required');
    req('practiceEmail', 'Practice email is required');
    email('practiceEmail');
    req('practicePhone', 'Practice phone is required');

    const shadow = document.querySelector('input[name="shadow"]:checked');
    if (!shadow) { setError('shadow', 'Please select an option'); ok = false; }

    return ok;
  }

  function setInputsDisabled(disabled) {
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(input => {
      input.disabled = disabled;
    });
  }

  function clearForm() {
    document.getElementById('patientFirstName').value = '';
    document.getElementById('patientLastName').value = '';
    document.getElementById('dob').value = '';
    document.getElementById('address').value = '';
    document.getElementById('mobileNumber').value = '';
    document.getElementById('patientEmail').value = '';
    document.getElementById('medicalHistory').value = '';
    document.getElementById('dentistName').value = '';
    document.getElementById('gdcNumber').value = '';
    document.getElementById('practiceName').value = '';
    document.getElementById('practiceAddress').value = '';
    document.getElementById('practiceEmail').value = '';
    document.getElementById('practicePhone').value = '';
    document.getElementById('fileUpload').value = '';
    document.getElementById('file-list').textContent = '';
    
    document.querySelectorAll('#referralServices input[type="checkbox"]').forEach(cb => {
      cb.checked = false;
      cb.closest('.checkbox-label').classList.remove('checked');
    });
    
    document.querySelectorAll('input[name="shadow"]').forEach(radio => {
      radio.checked = false;
    });
  }

  async function submitForm() {
    clearErrors();
    if (!validate()) {
      showToast('Please fix the errors above.', 'error');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      return;
    }

    const services = [...document.querySelectorAll('#referralServices input:checked')].map(c => c.value);
    const shadow = document.querySelector('input[name="shadow"]:checked')?.value;

    const payload = {
      patientFirstName: document.getElementById('patientFirstName').value.trim(),
      patientLastName: document.getElementById('patientLastName').value.trim(),
      patientDateOfBirth: document.getElementById('dob').value ? new Date(document.getElementById('dob').value).toISOString() : null,
      patientAddress: document.getElementById('address').value.trim(),
      patientPhoneNumber: document.getElementById('mobileCountry').value + document.getElementById('mobileNumber').value.trim(),
      patientEmail: document.getElementById('patientEmail').value.trim(),
      treatmentDetails: document.getElementById('medicalHistory').value.trim(),
      referralDetails: services,
      referralName: document.getElementById('dentistName').value.trim(),
      referralGDC: document.getElementById('gdcNumber').value.trim(),
      referralPracticeNameAddress: document.getElementById('practiceName').value.trim() + (document.getElementById('practiceAddress').value ? ' - ' + document.getElementById('practiceAddress').value.trim() : ''),
      referralEmail: document.getElementById('practiceEmail').value.trim(),
      referralPhoneNumber: document.getElementById('practiceCountry').value + document.getElementById('practicePhone').value.trim(),
      attendTreatment: shadow === 'yes' ? 'Yes' : 'No',
      medicalHistoryPdfUrl: null,
      other: ''
    };

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-loader"></span> Submitting...';
    setInputsDisabled(true);

    try {
      const res = await fetch('https://aspire-clinix.vercel.app/api/referrals', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json().catch(() => null);

      if (!res.ok) {
        throw new Error(data?.message || `Server error: ${res.status}`);
      }

      showToast('Referral submitted successfully!', 'success');
      clearForm();
    } catch (err) {
      console.error(err);
      showToast(err.message || 'Submission failed. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Submit Referral';
      setInputsDisabled(false);
    }
  }
</script>
</body>
</html>
